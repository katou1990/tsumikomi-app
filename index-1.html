/* 今日が「日曜・祝日」かを返す（土曜は別判定） */
function isJpHolidayOrSunday(){
  const d=new Date();
  const dow=d.getDay(); // 0=日
  if(dow===0) return true;
  const ymd=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  return JP_HOLIDAYS.has(ymd);
}
function isSaturday(){ return new Date().getDay()===6; }

/* 起動時・日付変更時に自動で休日モードを設定する。
 * 土曜: 強制ON（手動変更不可）
 * 日祝: ONに設定（手動でOFF可能）
 * 平日: 作業者はOFFに強制。管理者は現在値を維持（手動で変更可能）  */
function applyHolidayRule(){
  if(isSaturday()){
    isHoliday=true;
    localStorage.setItem("isHoliday","1");
    return;
  }
  if(isJpHolidayOrSunday()){
    // 日祝：まだOFFなら自動でONにする（一度手動でOFFにした場合はそのまま維持）
    if(localStorage.getItem("isHoliday")!=="0_manual"){
      isHoliday=true;
      localStorage.setItem("isHoliday","1");
    } else {
      isHoliday=false;
    }
    return;
  }
  // 平日：作業者はOFF強制
  if(role!=="admin"){
    isHoliday=false;
    localStorage.setItem("isHoliday","0");
  }
  // 平日の管理者：localStorage の値をそのまま使う（現在のisHolidayを維持）
}

/* =====================================================================
 * オフライン入力キュー（IndexedDB）
 * 圏外でも「保存ボタン」が機能し、復帰時に自動送信する。
 * DB: offlineQueue テーブル / store: records（保存待ちの登録データ）
 * ===================================================================*/
const OQ = (() => {
  let db = null;
  const DB_NAME = "tsumikomi_offline", STORE = "records", VER = 1;
  function open(){
    return new Promise((res, rej) => {
      if(db){ res(db); return; }
      const req = indexedDB.open(DB_NAME, VER);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, {keyPath:"qid", autoIncrement:true});
      req.onsuccess = e => { db = e.target.result; res(db); };
      req.onerror   = e => rej(e.target.error);
    });
  }
  async function enqueue(payload){
    const d = await open();
    return new Promise((res, rej) => {
      const tx = d.transaction(STORE, "readwrite");
      const r  = tx.objectStore(STORE).add({...payload, _queuedAt: new Date().toISOString()});
      r.onsuccess = () => res(r.result);
      r.onerror   = e => rej(e.target.error);
    });
  }
  async function getAll(){
    const d = await open();
    return new Promise((res, rej) => {
      const tx = d.transaction(STORE, "readonly");
      const r  = tx.objectStore(STORE).getAll();
      r.onsuccess = () => res(r.result);
      r.onerror   = e => rej(e.target.error);
    });
  }
  async function remove(qid){
    const d = await open();
    return new Promise((res, rej) => {
      const tx = d.transaction(STORE, "readwrite");
      const r  = tx.objectStore(STORE).delete(qid);
      r.onsuccess = () => res();
      r.onerror   = e => rej(e.target.error);
    });
  }
  return { enqueue, getAll, remove };
})();

/* オフラインキューの件数をバナーに表示 */
async function updateOfflineBanner(){
  const items = await OQ.getAll().catch(()=>[]);
  let banner = document.getElementById("offlineBanner");
  if(!banner){
    banner = document.createElement("div");
    banner.id = "offlineBanner";

    document.body.appendChild(banner);
  }
  if(!navigator.onLine || items.length){
    const cnt   = items.length;
    const online = navigator.onLine;
    const bg     = online ? "#0d9488" : "#92400e";
    const txt    = online
      ? ("📡 " + cnt + (lang==="ja" ? "件の未送信データを送信中…" : " record(s) sending…"))
      : ("📵 " + (lang==="ja" ? "オフライン" : "Offline") + (cnt ? ("  " + (lang==="ja" ? "未送信 " : "Unsent ") + cnt + (lang==="ja" ? "件" : "")) : ""));
    banner.innerHTML = '<div style="background:' + bg + ';color:#fff;border-radius:999px;padding:6px 18px;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.25);pointer-events:auto">' + txt + '</div>';
  } else {
    banner.innerHTML = "";
  }
}

});

async function flushOfflineQueue(){
  if(!user) return;
  const items = await OQ.getAll().catch(()=>[]);
  for(const item of items){
    try{
      const { qid, _queuedAt, ...payload } = item;
      const ins = await sb.from("load_records").insert(payload).select().single();
      if(ins.error) throw ins.error;
      await OQ.remove(qid);
    }catch(e){ /* 1件失敗しても続ける */ }
  }
  await updateOfflineBanner();
  if((await OQ.getAll().catch(()=>[])).length === 0 && navigator.onLine){
    const items2 = await OQ.getAll().catch(()=>[]);
    if(items2.length === 0){ await loadRecords(); }
  }
}

/* ---- 日付ラベル ---- */
function dayLabel(iso){
  const d=new Date(iso), n=new Date();
  const same=(a,b)=>a.getFullYear()==b.getFullYear()&&a.getMonth()==b.getMonth()&&a.getDate()==b.getDate();
  const y=new Date(n); y.setDate(n.getDate()-1);
  if(same(d,n)) return lang==="ja"?"本日":"Today";
  if(same(d,y)) return lang==="ja"?"昨日":"Yesterday";
  return (d.getMonth()+1)+"/"+d.getDate();
}
function hhmm(iso){ const d=new Date(iso); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }
function isToday(iso){ const d=new Date(iso),n=new Date(); return d.getFullYear()==n.getFullYear()&&d.getMonth()==n.getMonth()&&d.getDate()==n.getDate(); }

function yokoGroupPrefix(label){
  if(!label) return null;

  if(label.indexOf("アトム電器")===0) return "アトム電器";

async function checkYokoGroupZero(label){
  const prefix=yokoGroupPrefix(label); if(!prefix) return;
  const group=yoku.filter(r=>yokoGroupPrefix(r.label)===prefix);
  if(!group.length || !group.every(ydone)) return;
  const targets=pal.filter(r=>r.label && r.label.indexOf(prefix)===0);

  if(targets.length){ await loadPal(); toast(lang==="ja"?prefix+" のパレット残数を0にしました":prefix+" pallets reset to 0"); }

async function checkPalletZeroToYoko(palLabel){
  const prefix=yokoGroupPrefix(palLabel); if(!prefix) return;
  const dest = palLabel.indexOf("DC1")>=0 ? "DC1" : (palLabel.indexOf("DC3")>=0 ? "DC3" : null);
  if(!dest) return;
  const targets=yoku.filter(r=>yokoGroupPrefix(r.label)===prefix && r.label.indexOf(dest)>=0 && !ydone(r));

}

const HKANA_MAP={
  "ｱ":"ア","ｲ":"イ","ｳ":"ウ","ｴ":"エ","ｵ":"オ","ｶ":"カ","ｷ":"キ","ｸ":"ク","ｹ":"ケ","ｺ":"コ",
  "ｻ":"サ","ｼ":"シ","ｽ":"ス","ｾ":"セ","ｿ":"ソ","ﾀ":"タ","ﾁ":"チ","ﾂ":"ツ","ﾃ":"テ","ﾄ":"ト",

  "ﾏ":"マ","ﾐ":"ミ","ﾑ":"ム","ﾒ":"メ","ﾓ":"モ","ﾔ":"ヤ","ﾕ":"ユ","ﾖ":"ヨ",
  "ﾗ":"ラ","ﾘ":"リ","ﾙ":"ル","ﾚ":"レ","ﾛ":"ロ","ﾜ":"ワ","ｦ":"ヲ","ﾝ":"ン",
  "ｧ":"ァ","ｨ":"ィ","ｩ":"ゥ","ｪ":"ェ","ｫ":"ォ","ｬ":"ャ","ｭ":"ュ","ｮ":"ョ","ｯ":"ッ",
  "ｰ":"ー","｡":"。","､":"、","｢":"「","｣":"」","ﾞ":"゛","ﾟ":"゜"
};
const HKANA_DAKUTEN={
  "ｶﾞ":"ガ","ｷﾞ":"ギ","ｸﾞ":"グ","ｹﾞ":"ゲ","ｺﾞ":"ゴ",
  "ｻﾞ":"ザ","ｼﾞ":"ジ","ｽﾞ":"ズ","ｾﾞ":"ゼ","ｿﾞ":"ゾ",
  "ﾀﾞ":"ダ","ﾁﾞ":"ヂ","ﾂﾞ":"ヅ","ﾃﾞ":"デ","ﾄﾞ":"ド",
  "ﾊﾞ":"バ","ﾋﾞ":"ビ","ﾌﾞ":"ブ","ﾍﾞ":"ベ","ﾎﾞ":"ボ",
  "ﾊﾟ":"パ","ﾋﾟ":"ピ","ﾌﾟ":"プ","ﾍﾟ":"ペ","ﾎﾟ":"ポ"
};
const SYM_HALF_TO_FULL={
  "+":"＋","&":"＆","%":"％","-":"－","!":"！","#":"＃","*":"＊",":":"：","/":"／",">":"＞",
  "\"":"”","$":"＄","@":"＠","<":"＜","=":"＝","(":"（",")":"）","~":"～","^":"＾","_":"＿",
  ".":"．",",":"，",";":"；","'":"’","\u0060":"｀","[":"［","]":"］","{":"｛","}":"｝","|":"｜","?":"？"
};
function normalizeCourseCode(s){
  let v=String(s||"").trim();
  if(!v) return v;
  // 半角カナ濁点・半濁点を先に処理
  Object.keys(HKANA_DAKUTEN).forEach(k=>{ v=v.split(k).join(HKANA_DAKUTEN[k]); });
  // 半角カナ→全角カナ
  v=v.split("").map(ch=>HKANA_MAP[ch]||ch).join("");
  // 全角英数字→半角
  v=v.replace(/[Ａ-Ｚａ-ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0));
  // 半角記号→全角記号（マスタの表記に合わせる）
  v=v.split("").map(ch=>SYM_HALF_TO_FULL[ch]||ch).join("");
  // 英字は大文字に統一
  v=v.toUpperCase();
  return v;
}

/* ---- 物量管理 ---- */
let vol=[];
function volTodayVal(r){ return r.updated_date===todayStr() ? r.today_value : null; }
function volTodayOk(r){ return r.updated_date===todayStr() ? !!r.today_ok : false; }
function volTodaySupport(r){ return r.updated_date===todayStr() ? !!r.today_support : false; }
function volTodayAttend(r){ return r.today_absent_date===todayStr() ? (r.today_absent||null) : null; }
function volCapacity(r){
  const actual=volTodayAttend(r);
  if(actual==null || r.productivity==null || r.work_hours==null) return null;
  return Math.round(r.productivity*r.work_hours*actual);
}
function volLoadRatio(r){
  const cap=volCapacity(r); const v=volTodayVal(r);
  if(cap==null || cap===0 || v==null) return null;
  return v/cap;
}
function volDeadlinePassed(r){
  if(r.deadline_hour==null) return false;
  const n=new Date();
  const dl=new Date(); dl.setHours(r.deadline_hour, r.deadline_minute||0, 0, 0);
  return n>dl;
}
function volStatus(r){
  const v=volTodayVal(r);
  if(v==null){ return volDeadlinePassed(r) ? "missing" : "none"; }
  if(volTodayOk(r)) return "ok";
  const ratio=volLoadRatio(r);
  let base="ok";
  if(ratio!=null && r.alert_ratio!=null && ratio>=r.alert_ratio) base="alert";
  else if(ratio!=null && r.warn_ratio!=null && ratio>=r.warn_ratio) base="warn";
  else if(ratio==null){
    if(r.alert_value!=null && v>=r.alert_value) base="alert";
    else if(r.warn_value!=null && v>=r.warn_value) base="warn";
  }
  if((base==="alert"||base==="warn") && volTodaySupport(r)) return "support";
  return base;
}

/* 物量入力の本日値を、出荷量実績(route_records)へ日付つき1行で同期する。
   荷主ラベル → 内部キー(shark等)を逆引きし、route_key="vol_sync" の当日行を upsert。
   過去分は volume_shipment に履歴が無いため、ここで保存した日以降が日別・月別に反映される。 */
async function syncVolToRoute(rows){
  try{
    const today=todayStr();
    // 日本語ラベル → 内部キー の逆引き表（SHIPPER_LABELSの逆）
    const labelToKey={};
    Object.keys(SHIPPER_LABELS).forEach(k=>{ labelToKey[SHIPPER_LABELS[k]]=k; });
    // 荷主ごとの本日値を集約（vol配列のlabelと突き合わせ）
    const volByKey={shark:0,siroca:0,dream:0,pioneer:0,atom:0};
    let matched=false;
    rows.forEach(row=>{
      const vrow=vol.find(x=>x.id===row.id);
      if(!vrow) return;
      const key=labelToKey[(vrow.label||"").trim()];
      if(key && row.today_value!=null){ volByKey[key]+=row.today_value; matched=true; }
    });
    if(!matched) return; // 5荷主に一致する入力が無ければ同期しない
    // 当日の vol_sync 行が既にあるか確認（自分の作成分）
    const {data:existing}=await sb.from("route_records")
      .select("id").eq("record_date",today).eq("route_key","vol_sync").limit(1);
    const payload={
      record_date: today,
      route_key: "vol_sync",
      route_label: "物量入力(自動)",
      seq: 0,
      vol_shark: volByKey.shark,
      vol_siroca: volByKey.siroca,
      vol_dream: volByKey.dream,
      vol_pioneer: volByKey.pioneer,
      vol_atom: volByKey.atom,
      no_problem: false,
      note: "物量入力画面から自動連携",
      created_by: user?.email||null,
      updated_at: new Date().toISOString()
    };
    if(existing&&existing.length){
      await sb.from("route_records").update(payload).eq("id",existing[0].id);
    }else{
      await sb.from("route_records").insert(payload);
    }
  }catch(e){ /* 同期失敗は物量保存本体を止めない */ }
}

function volRecalc(id){
  const r=vol.find(x=>x.id===id); if(!r) return;
  const el=document.getElementById("vcalc_"+id); if(!el) return;
  const inp=document.getElementById("vv_"+id); const at=document.getElementById("va_"+id);
  const supEl=document.getElementById("vs_"+id);
  const v=inp&&inp.value.trim()!==""?parseInt(inp.value):null;
  const attend=at&&at.value.trim()!==""?parseInt(at.value):null;
  const supported=supEl&&supEl.checked;
  if(attend==null){
    el.innerHTML=`<p class="hint">${lang==="ja"?"出勤人数を入力すると、処理能力・負荷率が自動計算されます":"Enter attendance to auto-calculate capacity and load"}</p>`;
    return;
  }
  let html=`<div style="font-size:13px;color:#475569">${lang==="ja"?"出勤":"Attendance"}：<b style="color:#1e3a8a">${attend}${lang==="ja"?"名":""}</b></div>`;
  if(r.productivity!=null && r.work_hours!=null){
    const cap=Math.round(r.productivity*r.work_hours*attend);
    html+=`<div style="margin-top:6px;font-size:13px;color:#475569">${lang==="ja"?"処理能力":"Capacity"}：<b>${cap}${lang==="ja"?"件":""}</b></div>`;
    if(v!=null && cap>0){
      const ratio=v/cap;
      const pct=Math.round(ratio*100);
      let stLabel=lang==="ja"?"正常":"OK", stColor="#15803d";
      if(!supported){
        if(r.alert_ratio!=null && ratio>=r.alert_ratio){ stLabel=lang==="ja"?"警告":"Alert"; stColor="#b91c1c"; }
        else if(r.warn_ratio!=null && ratio>=r.warn_ratio){ stLabel=lang==="ja"?"注意":"Caution"; stColor="#b45309"; }
      } else if(r.alert_ratio!=null && ratio>=r.alert_ratio || r.warn_ratio!=null && ratio>=r.warn_ratio){
        stLabel=lang==="ja"?"正常（応援対応済み）":"OK (support arranged)"; stColor="#15803d";
      }
      html+=`<div style="margin-top:6px;font-size:13px;color:#475569">${lang==="ja"?"負荷率":"Load"}：<b style="color:${stColor}">${pct}%</b>　${lang==="ja"?"状態":"Status"}：<b style="color:${stColor}">${stLabel}</b></div>`;
    }
  } else {
    html+=`<p class="hint" style="margin-top:6px">${lang==="ja"?"生産性・実働時間が未設定です（マスタ変更で入力してください）":"Productivity/work hours not set (enter in master data)"}</p>`;
  }
  el.innerHTML=html;
}

async function doLogin(){

  await afterLogin();

async function afterLogin(){
  resetIdleTimer();
  // DBのuser_rolesテーブルからロールを取得（DB側で強制）
  try{
    const { data: roleRow } = await sb.from('user_roles').select('role').eq('email', user.email.toLowerCase()).maybeSingle();
    const dbRole = roleRow?.role || 'worker';
    isViewOnly    = dbRole === 'view_only';
    isDestOnly    = dbRole === 'dest_only';
    isAdminAllowed = dbRole === 'admin';
  } catch(e){
    // user_rolesテーブルがまだない場合は従来のメール配列で判定（移行期の保険）
    isViewOnly    = !!(user && user.email && VIEW_ONLY_EMAILS.includes(user.email.toLowerCase()));
    isDestOnly    = !!(user && user.email && DEST_ONLY_EMAILS.includes(user.email.toLowerCase()));
    isAdminAllowed = !!(user && user.email && ADMIN_EMAILS.includes(user.email.toLowerCase()));
  }
  await loadRecords();
  await loadYoko();
  await loadPal();
  await loadMaster();
  // 31日以上未使用のコース記号を自動削除（管理者権限時のみ・1日1回）
  if(isAdminAllowed){
    const todayKey=todayStr();
    if(localStorage.getItem("lastCourseClean")!==todayKey){
      try{ await cleanupOldCourses(); localStorage.setItem("lastCourseClean",todayKey); }catch(e){ console.error("cleanup failed",e); }
    }
  }
  await loadVol();
  await loadDirectLoad();
  sb.channel("rt").on("postgres_changes",{event:"*",schema:"public",table:"load_records"},loadRecords)
    .on("postgres_changes",{event:"*",schema:"public",table:"courses"},loadRecords)
    .on("postgres_changes",{event:"*",schema:"public",table:"yokomochi_status"},loadYoko)
    .on("postgres_changes",{event:"*",schema:"public",table:"pallet_remain"},loadPal)
    .on("postgres_changes",{event:"*",schema:"public",table:"master_items"},loadMaster)
    .on("postgres_changes",{event:"*",schema:"public",table:"volume_shipment"},loadVol)
    .on("postgres_changes",{event:"*",schema:"public",table:"direct_load_courses"},loadDirectLoad).subscribe();
  // ログイン時にオフラインキューを送信
  await updateOfflineBanner();
  if(navigator.onLine) await flushOfflineQueue();
}

function badgesNoConf(r){

async function recordCard(r){

/* 写真を長辺1280px・JPEG品質70%に自動圧縮して Blob を返す */
function compressPhoto(file){
  return new Promise(resolve=>{
    const MAX_SIDE=1280, QUALITY=0.70;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>MAX_SIDE||h>MAX_SIDE){
          if(w>=h){ h=Math.round(h*MAX_SIDE/w); w=MAX_SIDE; }
          else     { w=Math.round(w*MAX_SIDE/h); h=MAX_SIDE; }
        }
        const cv=document.createElement("canvas");
        cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        cv.toBlob(blob=>{
          // 圧縮後の方が大きい場合(小サイズ写真)は元ファイルをそのまま使う
          resolve(blob && blob.size<file.size ? new File([blob],file.name,{type:"image/jpeg"}) : file);
        },"image/jpeg",QUALITY);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function onFiles(e){
  if(isViewOnly||isDestOnly){ viewOnlyBlock(); e.target.value=""; return; }
  const MAX_BYTES = 10 * 1024 * 1024;
  const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp','image/heic','image/heif'];
  const candidates = [...e.target.files];
  const valid = [];
  for(const f of candidates){
    if(!ALLOWED_TYPES.includes(f.type.toLowerCase()) && !f.name.toLowerCase().match(/\.(jpg|jpeg|png|webp|heic|heif)$/)){
      toast(lang==="ja"?`「${f.name}」は画像ファイルではありません`:`"${f.name}" is not an image file`);
      continue;
    }
    if(f.size > MAX_BYTES){
      toast(lang==="ja"?`「${f.name}」が10MBを超えています（${(f.size/1024/1024).toFixed(1)}MB）`:`"${f.name}" exceeds 10MB (${(f.size/1024/1024).toFixed(1)}MB)`);
      continue;
    }
    valid.push(f);
  }
  const take = valid.slice(0, 3 - regPhotos.length);
  // 圧縮してから追加
  Promise.all(take.map(compressPhoto)).then(compressed=>{
    compressed.forEach(f=>regPhotos.push(f));
    e.target.value="";
    drawPhotos(); updateAnom();
  });
}

async function startScan(){
  try{
    qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1920},height:{ideal:1080}}});
  }catch(e){
    const m=document.getElementById("qrMsg"); if(m) m.textContent=(lang==="ja"?"カメラを開けませんでした。「許可」が必要です。":"Cannot open camera. Allow permission."); return;
  }
  const holder=document.getElementById("qr-reader"); if(holder) holder.innerHTML="";
  qrVideo=document.createElement("video"); qrVideo.setAttribute("playsinline",""); qrVideo.muted=true; qrVideo.autoplay=true;
  qrVideo.style.cssText="width:100%;height:100%;object-fit:cover";
  if(holder) holder.appendChild(qrVideo); qrVideo.srcObject=qrStream; try{ await qrVideo.play(); }catch(e){}
  if("BarcodeDetector" in window){ try{ let fmts=[]; try{ fmts=await window.BarcodeDetector.getSupportedFormats(); }catch(e){} if(!fmts.length || fmts.indexOf("qr_code")>=0){ qrDetector=new window.BarcodeDetector({formats:["qr_code"]}); } }catch(e){} }

}
async function nativeScanTick(){
  if(!qrVideo||qrVideo.readyState<2) return;
  const vw=qrVideo.videoWidth, vh=qrVideo.videoHeight; if(!vw||!vh) return;
  if(qrDetector){ try{ const codes=await qrDetector.detect(qrVideo); if(codes&&codes.length){ onQrScan(codes[0].rawValue); return; } }catch(e){} }
  else if(typeof jsQR!=="undefined"){ const w=Math.min(vw,640), hh=Math.round(w*vh/vw); const found=await decodeFrame(qrVideo,w,hh,0,0,vw,vh); if(found){ onQrScan(found); return; } }
}
async function decodeFrame(video,outW,outH,sx,sy,sw,sh){
  try{
    const cv=document.createElement("canvas"); cv.width=outW; cv.height=outH;
    const cx=cv.getContext("2d",{willReadFrequently:true}); cx.drawImage(video,sx,sy,sw,sh,0,0,outW,outH);
    if(qrDetector){ try{ const codes=await qrDetector.detect(cv); if(codes&&codes.length) return codes[0].rawValue; }catch(e){} }
    if(typeof jsQR!=="undefined"){ try{ const img=cx.getImageData(0,0,outW,outH); const r=jsQR(img.data,outW,outH,{inversionAttempts:"attemptBoth"}); if(r&&r.data) return r.data; }catch(e){} }
  }catch(e){}
  return null;
}
async function snapShot(){

  const vw=qrVideo.videoWidth, vh=qrVideo.videoHeight; if(!vw||!vh){ flashMsg(lang==="ja"?"カメラ準備中です":"Camera not ready"); return; }
  let found=await decodeFrame(qrVideo,vw,vh,0,0,vw,vh);
  if(!found){ const cw=Math.floor(vw*0.6),ch=Math.floor(vh*0.6),cx=Math.floor((vw-cw)/2),cy=Math.floor((vh-ch)/2); found=await decodeFrame(qrVideo,cw*2,ch*2,cx,cy,cw,ch); }

}

function onQrScan(text){
  const code=String(text||"").trim(); if(!code) return;
  const now=Date.now();
  if(code===qrLast && now-qrLastT<2000) return;
  qrLast=code; qrLastT=now;
  if(isDirectLoadCode(code)){
    const big=document.getElementById("qrBig"); if(big){ big.textContent=(lang==="ja"?"直積みのため登録できません：":"Direct loading, cannot add: ")+code; big.style.color="#fca5a5"; setTimeout(()=>{ if(big) big.style.color="#fff"; },1600); }
    return;
  }
  // 納品先によるコースグループ制限チェック（QRスキャン時）
  const allowedGrps=allowedCourseGrps();
  if(allowedGrps){
    const inDc1_4f=getMaster("course_dc1_4f").includes(code)||getMaster("course_dc1").includes(code);
    const inDc1_1f=getMaster("course_dc1_1f").includes(code)||getMaster("course_dc1").includes(code);
    const inDc3=getMaster("course_dc3").includes(code);
    // マスタに無いコード（手動未登録）は制限しない
    if(inDc1_4f||inDc1_1f||inDc3){
      const ok=(inDc1_4f&&allowedGrps.dc1_4f)||(inDc1_1f&&allowedGrps.dc1_1f)||(inDc3&&allowedGrps.dc3);
      if(!ok){
        const big=document.getElementById("qrBig"); if(big){ big.textContent=(lang==="ja"?"この納品先では選択できません：":"Not allowed for current destination: ")+code; big.style.color="#fca5a5"; setTimeout(()=>{ if(big) big.style.color="#fff"; },2000); }

  const big=document.getElementById("qrBig"); if(big){ big.textContent=(lang==="ja"?"読み取り：":"Scanned: ")+code; big.style.color="#4ade80"; setTimeout(()=>{ if(big) big.style.color="#fff"; },500); }

}

/* ---- 積み地ごとの第一優先チェック ---- */
// 戻り値: 違反している積み地名の配列（空なら問題なし）
function checkPriorityOki(){
  if(isHoliday) return []; // 休日モード：第一優先チェック全解除
  if(!regOki.length || !regCourses.length) return [];
  // 選択中コースに赤・黄・青が1つでもあれば問題なし
  const hasPriColor = regCourses.some(c=>{
    const color = colorOf(c.grp, c.code);
    return color==="red"||color==="yellow"||color==="blue";
  });
  if(hasPriColor) return []; // 第一優先コースが混在 → OK
  // 通常コースのみ選択されている → 各積み地の第一優先完了状態を確認
  const violated = regOki.filter(oki=>{
    const prefix = oki.trim();
    // yoku の中でこの積み地ラベルに対応し、priority=true かつ未完了のものが1つでもあるか
    return yoku.some(r=>yokoGroupPrefix(r.label)===prefix && r.priority && !ydone(r));
  });
  return violated;
}
function priorityOkiMsg(violated){
  if(lang!=="ja") return violated.map(v=>`${v}: Priority routes not done yet. Please include a priority course.`).join(" / ");
  return violated.map(v=>`${v} の第一優先（赤/黄/青）が未完了です。第一優先コースを含めてください。`).join("　");
}
/* ---- 納品先によるコースグループ制限 ---- */
// 選択中の納品先からDC1のみ/DC3のみ/両方/制限なしを返す
/* ---- 納品先によるコースグループ制限（精密版） ----
   各グループが許可されるかを納品先の文字列から判定する。
   - DC1 4F を含む → course_dc1_4f を許可
   - DC1 を含むが 4F でない（例：DC1 1F北、DC1 1F等）→ course_dc1_1f を許可
   - DC3 を含む → course_dc3 を許可
   - 何も含まない → 全て許可（制限なし）
*/
function allowedCourseGrps(){
  // 選択中の納品先から許可グループセットを作成
  let allow4f=false, allow1f=false, allow3=false;
  regDests.forEach(d=>{
    if(d.indexOf("DC1 4F")>=0 || d.indexOf("DC14F")>=0) allow4f=true;
    else if(d.indexOf("DC1")>=0) allow1f=true; // DC1だが4Fでない → 1F系
    if(d.indexOf("DC3")>=0) allow3=true;
  });
  const any=allow4f||allow1f||allow3;
  if(!any) return null; // 制限なし
  return { dc1_4f:allow4f, dc1_1f:allow1f, dc3:allow3 };
}
function courseGrpBlocked(grp){
  if(isHoliday) return false; // 休日モード：全グループ選択可能
  const a=allowedCourseGrps();
  if(!a) return false;
  if(grp==="course_dc1_4f") return !a.dc1_4f;
  if(grp==="course_dc1_1f") return !a.dc1_1f;
  if(grp==="course_dc3")    return !a.dc3;
  return false;
}
function courseGrpBlockMsg(grp){
  const a=allowedCourseGrps();
  if(!a) return "";
  if(grp==="course_dc1_4f"&&!a.dc1_4f){
    return lang==="ja"
      ? "納品先にDC1 4Fが含まれていないため、DC1 4F行きコースは選択できません。"
      : "DC1 4F courses are not allowed based on your destination selection.";
  }
  if(grp==="course_dc1_1f"&&!a.dc1_1f){
    return lang==="ja"
      ? "納品先にDC1（1F系）が含まれていないため、DC1 1F行きコースは選択できません。"
      : "DC1 1F courses are not allowed based on your destination selection.";
  }
  if(grp==="course_dc3"&&!a.dc3){
    return lang==="ja"
      ? "納品先にDC3が含まれていないため、DC3行きコースは選択できません。"
      : "DC3 courses are not allowed based on your destination selection.";
  }
  return "";
}

  if(getMaster(kind).includes(v)) return;
  const so=(masterRows[kind]||[]).reduce((mx,r)=>Math.max(mx,r.sort_order),0)+1;
  const {data,error}=await sb.from("master_items").insert({kind:kind,value:v,sort_order:so,color:""}).select();
  if(!error&&data){ (masterRows[kind]=masterRows[kind]||[]).push({id:data[0].id,value:v,sort_order:so,color:""}); }
}
// 登録されたコードを master_items に自動追加し、used_at を更新する
// grp: course_dc3 / course_dc1_4f / course_dc1_1f / course_dc1 / manual
async function syncCoursesToMaster(courses){
  // grp ごとにコードをまとめる
  const grpMap={};
  for(const c of courses){
    let kind=c.grp;
    if(!kind||kind==="manual") continue; // grpが無い手動入力はスキップ（どのグループか不明なため）
    if(!["course_dc3","course_dc1_4f","course_dc1_1f","course_dc1"].includes(kind)) continue;
    (grpMap[kind]=grpMap[kind]||new Set()).add(c.code);
  }
  const nowIso=new Date().toISOString();
  for(const kind of Object.keys(grpMap)){
    const existing=getMaster(kind); // 既存マスタのコード一覧
    for(const code of grpMap[kind]){
      if(existing.includes(code)){
        // 既存 → used_at だけ更新
        const row=(masterRows[kind]||[]).find(r=>r.value===code);
        if(row){ await sb.from("master_items").update({used_at:nowIso}).eq("id",row.id); row.used_at=nowIso; }
      } else {
        // 新規 → マスタに追加
        const so=(masterRows[kind]||[]).reduce((mx,r)=>Math.max(mx,r.sort_order||0),0)+1;
        const {data,error}=await sb.from("master_items").insert({kind,value:code,sort_order:so,color:"",used_at:nowIso}).select();
        if(!error&&data){ (masterRows[kind]=masterRows[kind]||[]).push({id:data[0].id,value:code,sort_order:so,color:"",used_at:nowIso}); }
      }
    }
  }
}

// 31日以上使われていないコース記号を自動削除する
async function cleanupOldCourses(){
  const cutoff=new Date(Date.now()-31*24*60*60*1000).toISOString();
  for(const kind of ["course_dc3","course_dc1_4f","course_dc1_1f","course_dc1"]){
    const rows=masterRows[kind]||[];
    const toDelete=rows.filter(r=>r.used_at && r.used_at<cutoff);
    for(const row of toDelete){
      const {error}=await sb.from("master_items").delete().eq("id",row.id);
      if(!error){ masterRows[kind]=(masterRows[kind]||[]).filter(r=>r.id!==row.id); }
    }
  }
}

function getCnt(c){ if(!c) return 0; if(c.checked){ const n=parseInt(c.checked_at); return(!isNaN(n)&&n>=1&&n<=(c.pl||1))?n:(c.pl||1); } const n=parseInt(c.checked_at); return(!isNaN(n)&&n>=1&&n<=(c.pl||1))?n:0; }

// PLごとの個別ボタン：押したインデックスをトグル（リスト順は変えない）
async function tapCoursePl(cid,rid,tapIdx,pl){
  if(isViewOnly) return viewOnlyBlock();
  const rec=records.find(x=>String(x.id)===String(rid));
  if(!rec||!rec.courses) return;
  const course=rec.courses.find(c=>String(c.id)===String(cid));
  if(!course) return;
  const curCnt=getCnt(course);
  const newCnt = tapIdx < curCnt ? tapIdx : tapIdx + 1;
  const newChecked = newCnt >= pl;
  const newCheckedAt = newCnt > 0 ? String(newCnt) : null;
  await sb.from("courses").update({checked:newChecked, checked_at:newCheckedAt}).eq("id",cid);
  course.checked=newChecked; course.checked_at=newCheckedAt;
  // DOM更新（リスト順は変えない）
  const rowEl=document.getElementById("courseRow_"+cid);
  if(rowEl){
    rowEl.style.border=`2px solid ${newChecked?"#0d9488":"var(--line)"}`;
    rowEl.style.background=newChecked?"var(--teal-soft)":"#fff";
    const cntEl=document.getElementById("cntLabel_"+cid);
    if(cntEl) cntEl.textContent=`${newCnt}/${pl} PL`;
    const btns=rowEl.querySelectorAll("button");
    btns.forEach((btn,i)=>{
      const checked=i<newCnt;
      btn.style.border=`2px solid ${checked?"#0d9488":"#cbd5e1"}`;
      btn.style.background=checked?"#0d9488":"#f8fafc";
      btn.style.color=checked?"#fff":"#94a3b8";
      btn.textContent=checked?"✓":"○";
    });
  }
  // allChecked再確認
  if(rec.courses){
    const allDone=rec.courses.every(c=>getCnt(c)>=(c.pl||1));
    const destBtn=document.querySelector(`button[onclick*="confirmDest('${rid}'"]`);
    if(destBtn) destBtn.setAttribute("onclick",`confirmDest('${rid}',${allDone})`);
    const msg=document.getElementById("checkAllMsg_"+rid);
    if(msg) msg.style.display=allDone?"none":"block";
  }
}

  if(dashPeriod==="today") return records.filter(r=>dayLabel(r.created_at)===dayLabel(now.toISOString()));
  if(dashPeriod==="week"){
    const d=new Date(now); d.setDate(d.getDate()-d.getDay()+1);
    const mon=d.toISOString().slice(0,10);
    return records.filter(r=>r.created_at&&r.created_at.slice(0,10)>=mon&&r.created_at.slice(0,10)<=todayStr);
  }
  if(dashPeriod==="7days"){
    const d=new Date(now); d.setDate(d.getDate()-6);
    const from=d.toISOString().slice(0,10);
    return records.filter(r=>r.created_at&&r.created_at.slice(0,10)>=from&&r.created_at.slice(0,10)<=todayStr);
  }
  if(dashPeriod==="custom"&&dashFrom&&dashTo)
    return records.filter(r=>r.created_at&&r.created_at.slice(0,10)>=dashFrom&&r.created_at.slice(0,10)<=dashTo);
  return records.filter(r=>dayLabel(r.created_at)===dayLabel(now.toISOString()));
}
function todayStrFn(){ const n=new Date(); return n.getFullYear()+"-"+("0"+(n.getMonth()+1)).slice(-2)+"-"+("0"+n.getDate()).slice(-2); }

function svgBar(data, labelKey, valKey, color, height, opts={}){
  if(!data.length) return `<p class="hint">${lang==="ja"?"データなし":"No data"}</p>`;
  const max=Math.max(...data.map(d=>d[valKey]),1);
  const W=320, H=height||160, pad=36, barW=Math.max(8,Math.floor((W-pad*2)/data.length)-4);
  const bars=data.map((d,i)=>{
    const bh=Math.max(2,Math.round((d[valKey]/max)*(H-44)));
    const x=pad+i*((W-pad*2)/data.length);
    const y=H-24-bh;
    const lbl=String(d[labelKey]).length>3?String(d[labelKey]).slice(0,3):String(d[labelKey]);
    return `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${color}" opacity="0.85"/>
      <text x="${x+barW/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#64748b">${esc(lbl)}</text>
      ${d[valKey]>0?`<text x="${x+barW/2}" y="${y-3}" text-anchor="middle" font-size="10" fill="#1e3a5f" font-weight="bold">${d[valKey]}</text>`:""}`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${bars}</svg>`;
}
/* 時間帯グラフ専用：バーを固定幅で並べ、コンテナを横スクロールにする */
function svgBarScroll(data, labelKey, valKey, color, height){
  if(!data.length) return `<p class="hint">${lang==="ja"?"データなし":"No data"}</p>`;
  const H=height||140, BAR_W=28, BAR_GAP=8, PAD_L=28, PAD_R=12;
  const max=Math.max(...data.map(d=>d[valKey]),1);
  const totalW=PAD_L + data.length*(BAR_W+BAR_GAP) + PAD_R;
  const bars=data.map((d,i)=>{
    const bh=Math.max(2,Math.round((d[valKey]/max)*(H-40)));
    const x=PAD_L+i*(BAR_W+BAR_GAP);
    const y=H-22-bh;
    const lbl=String(d[labelKey]);
    return `<rect x="${x}" y="${y}" width="${BAR_W}" height="${bh}" rx="4" fill="${color}" opacity="${d[valKey]?0.85:0.15}"/>
      <text x="${x+BAR_W/2}" y="${H-6}" text-anchor="middle" font-size="10" fill="#64748b">${esc(lbl)}</text>
      ${d[valKey]>0?`<text x="${x+BAR_W/2}" y="${y-4}" text-anchor="middle" font-size="11" fill="#1e3a5f" font-weight="bold">${d[valKey]}</text>`:""}`;
  }).join("");
  // 最大値ライン
  const gridY=H-22-Math.round(0.75*(H-40));
  const gridLine=`<line x1="${PAD_L}" y1="${gridY}" x2="${totalW-PAD_R}" y2="${gridY}" stroke="#e2e8f0" stroke-dasharray="4,3" stroke-width="1"/>`;
  return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px">
    <svg width="${totalW}" height="${H}" style="display:block;min-width:100%">
      ${gridLine}${bars}
    </svg>
  </div>`;
}
function svgLine(data, labelKey, valKey, color){
  if(data.length<2) return `<p class="hint">${lang==="ja"?"データが2日以上必要です":"Need 2+ days of data"}</p>`;
  const max=Math.max(...data.map(d=>d[valKey]),0.1);
  const W=320, H=120, pad=36;
  const pts=data.map((d,i)=>{
    const x=pad+i*((W-pad*2)/(data.length-1));
    const y=H-24-Math.round((d[valKey]/max)*(H-44));
    return {x,y,v:d[valKey],l:d[labelKey]};
  });
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}"/>
    <text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="10" fill="#1e3a5f" font-weight="bold">${p.v.toFixed(1)}</text>
    <text x="${p.x}" y="${H-8}" text-anchor="middle" font-size="9" fill="#64748b">${String(p.l).slice(-5)}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}</svg>`;
}

// 積込完了時刻から自動で開始時刻をセット（同じ積み地→納品先の最初の完了時刻）
function autoStartTime(routeKey){
  const r=ROUTES.find(x=>x.key===routeKey); if(!r) return null;
  const today=todayStrFn();
  const matched=records.filter(rec=>{
    if(!rec.created_at||rec.created_at.slice(0,10)!==today) return false;
    const okis=(rec.oki_chi||"").split("、").map(x=>x.trim());
    const dests=(rec.destination||"").split("、").map(x=>x.trim());
    return okis.some(o=>o===r.from) && dests.some(d=>d.includes(r.to.replace("（第一優先）","").replace("（中継第一優先）","")));
  });
  if(!matched.length) return null;
  const times=matched.map(rec=>rec.completed_at).filter(Boolean).sort();
  return times[0]||null;
}

// 進捗ボードのチェック時刻から自動で終了時刻をセット
function autoFinishTime(routeKey){
  const r=ROUTES.find(x=>x.key===routeKey); if(!r) return null;
  const today=todayStrFn();
  const matched=yoku.filter(y=>{
    const prefix=yokoGroupPrefix(y.label);
    return prefix===r.from && ydone(y);
  });
  if(!matched.length) return null;
  const times=matched.map(y=>y.done_at||y.updated_at).filter(Boolean).sort();
  return times[times.length-1]||null;
}

// ガントチャートSVG
function svgGantt(data){
  if(!data.length) return `<p class="hint">${lang==="ja"?"データなし":"No data"}</p>`;
  const validData=data.filter(d=>d.started_at);
  if(!validData.length) return `<p class="hint">${lang==="ja"?"開始時刻のあるデータがありません":"No records with start time"}</p>`;
  const allTimes=[...validData.map(d=>new Date(d.started_at).getTime()),...validData.filter(d=>d.finished_at).map(d=>new Date(d.finished_at).getTime())];
  const minT=Math.min(...allTimes); const maxT=Math.max(...allTimes,minT+3600000);
  const W=320, barH=18, gap=6, pad={l:8,r:8,t:16,b:20};
  const H=pad.t+(barH+gap)*validData.length+pad.b;
  const toX=t=>pad.l+(t-minT)/(maxT-minT)*(W-pad.l-pad.r);
  const COLORS=["#2563eb","#7c3aed","#059669","#d97706","#dc2626","#0891b2","#9333ea","#16a34a","#ea580c","#6366f1","#0d9488","#b45309"];
  const bars=validData.map((d,i)=>{
    const x1=toX(new Date(d.started_at).getTime());
    const x2=d.finished_at?toX(new Date(d.finished_at).getTime()):toX(maxT);
    const y=pad.t+(barH+gap)*i;
    const w=Math.max(4,x2-x1);
    const col=COLORS[i%COLORS.length];
    const label=d.route_label.replace("（第一優先）","★").replace("（中継第一優先）","中");
    const shortLabel=label.length>14?label.slice(0,14)+"…":label;
    return `<rect x="${x1.toFixed(1)}" y="${y}" width="${w.toFixed(1)}" height="${barH}" rx="3" fill="${col}" opacity="0.85"/>
      <text x="${(x1+2).toFixed(1)}" y="${(y+barH-4).toFixed(1)}" font-size="8" fill="#fff" font-weight="bold">${esc(shortLabel)} ${d.seq}便</text>`;
  }).join("");
  // 時刻軸
  const minH=new Date(minT).getHours(); const maxH=new Date(maxT).getHours()+1;
  const axis=[];
  for(let h=minH;h<=maxH;h++){
    const t=new Date(minT); t.setHours(h,0,0,0);
    if(t.getTime()<minT||t.getTime()>maxT) continue;
    const x=toX(t.getTime());
    axis.push(`<line x1="${x.toFixed(1)}" y1="${pad.t}" x2="${x.toFixed(1)}" y2="${H-pad.b}" stroke="#e2e8f0" stroke-width="1"/>
      <text x="${x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" fill="#94a3b8">${h}時</text>`);
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${axis.join("")}${bars}</svg>`;
}

// 荷主別積み上げ棒グラフ
function svgStackedBar(data){
  if(!data.length) return `<p class="hint">${lang==="ja"?"データなし":"No data"}</p>`;
  const W=320,H=160,pad=40;
  const totals=data.map(d=>SHIPPERS.reduce((s,k)=>s+(d[`vol_${k}`]||0),0));
  const maxV=Math.max(...totals,1);
  const barW=Math.max(8,Math.floor((W-pad*2)/data.length)-4);
  const bars=data.map((d,i)=>{
    const x=pad+i*((W-pad*2)/data.length);
    let yOff=H-24;
    const segs=SHIPPERS.map(k=>{
      const v=d[`vol_${k}`]||0; if(!v) return "";
      const bh=Math.round(v/maxV*(H-44));
      yOff-=bh;
      return `<rect x="${x}" y="${yOff}" width="${barW}" height="${bh}" fill="${SHIPPER_COLORS[k]}" opacity="0.85" title="${SHIPPER_LABELS[k]}:${v}"/>`;
    }).join("");
    const total=totals[i];
    const lbl=d.route_label.replace("DC2 5F → ","").replace("DC2 3F → ","").replace("アトム電器 → ","").replace("（第一優先）","★").replace("（中継第一優先）","中").slice(0,6);
    return `${segs}${total>0?`<text x="${x+barW/2}" y="${yOff-3}" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">${total}</text>`:""}
      <text x="${x+barW/2}" y="${H-8}" text-anchor="middle" font-size="8" fill="#64748b">${esc(lbl)}</text>`;
  }).join("");
  // 凡例
  const legend=SHIPPERS.map((k,i)=>`<rect x="${i*60+4}" y="0" width="10" height="10" fill="${SHIPPER_COLORS[k]}" rx="2"/><text x="${i*60+17}" y="9" font-size="9" fill="#475569">${SHIPPER_LABELS[k]}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H+20}" width="100%" style="overflow:visible"><g transform="translate(0,16)">${bars}</g><g transform="translate(0,4)">${legend}</g></svg>`;
}

async function loadRouteRecordsRange(from, to){
  const {data,error}=await sb.from("route_records").select("*").gte("record_date",from).lte("record_date",to).order("record_date").order("route_key").order("seq");
  return error?[]:(data||[]);
}

// 行き先別・荷主別の集計グラフ（期間合算）
function svgRouteBar(data){
  // data = [{route_label, total_vol}]
  if(!data.length) return `<p class="hint">${lang==="ja"?"データなし":"No data"}</p>`;
  const max=Math.max(...data.map(d=>d.total),1);
  const W=320, H=180, pad=40;
  const barW=Math.max(8,Math.floor((W-pad*2)/data.length)-4);
  const bars=data.map((d,i)=>{
    const bh=Math.max(2,Math.round(d.total/max*(H-50)));
    const x=pad+i*((W-pad*2)/data.length);
    const y=H-28-bh;
    const lbl=d.label.replace("DC2 5F → ","5F→").replace("DC2 3F → ","3F→").replace("アトム電器 → ","AT→").replace("（第一優先）","★").replace("（中継第一優先）","中").slice(0,7);
    return `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${d.pri?"#dc2626":"#2563eb"}" opacity="0.8"/>
      ${d.total>0?`<text x="${x+barW/2}" y="${y-3}" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">${d.total}</text>`:""}
      <text x="${x+barW/2}" y="${H-10}" text-anchor="middle" font-size="7.5" fill="#64748b">${esc(lbl)}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${bars}</svg>`;
}

// 日別推移折れ線グラフ（荷主合計）
function svgRouteTrend(dayTotals){
  if(dayTotals.length<2) return `<p class="hint">${lang==="ja"?"2日以上のデータが必要":"Need 2+ days"}</p>`;
  const max=Math.max(...dayTotals.map(d=>d.total),1);
  const W=320, H=120, pad=36;
  const pts=dayTotals.map((d,i)=>({
    x:pad+i*((W-pad*2)/(dayTotals.length-1)),
    y:H-24-Math.round(d.total/max*(H-44)),
    v:d.total, l:d.date.slice(5)
  }));
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#2563eb"/>
    <text x="${p.x}" y="${p.y-7}" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">${p.v}</text>
    <text x="${p.x}" y="${H-7}" text-anchor="middle" font-size="8" fill="#94a3b8">${p.l}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
    <path d="${path}" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}</svg>`;
}

function renderDashboard(){
  const recs=dashRecords();

  // -- KPIカード --
  const total=recs.length;
  const done=recs.filter(r=>r.completed_at).length;
  const pallets=recs.reduce((s,r)=>s+(r.pallets||0),0);
  const times=recs.map(r=>r.created_at?new Date(r.created_at).getTime():null).filter(Boolean);
  const spanH=times.length>1?(Math.max(...times)-Math.min(...times))/3600000:0;
  const prod=spanH>0?(total/spanH):0;

  // -- 時間帯別件数（1h刻み） --
  const byHour={};
  for(let h=0;h<24;h++) byHour[h]=0;
  recs.forEach(r=>{ if(r.created_at){ const h=new Date(r.created_at).getHours(); byHour[h]=(byHour[h]||0)+1; }});
  const hourData=Object.entries(byHour).map(([h,n])=>({label:`${h}時`,val:n})).filter(d=>d.val>0||
    (parseInt(d.label)>=6&&parseInt(d.label)<=22));

  // -- トラック別件数 --
  const byTruck={};
  recs.forEach(r=>{ const k=r.truck||"不明"; byTruck[k]=(byTruck[k]||0)+1; });
  const truckData=Object.entries(byTruck).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>({label:k,val:v}));

  // -- 積み地別件数 --
  const byOki={};

function exportCsv(){
  const res=window._searchRes||[];
  const head=["日時/Date","トラック/Truck","納品先/Destination","担当者/Worker","パレット数/Pallets","積込完了/Loaded","納品先完了/Received"];
  const rows=res.map(r=>[dayLabel(r.created_at)+" "+hhmm(r.created_at),r.truck||"",r.destination||"",r.worker_name||"",r.pallets||0,r.completed_at?hhmm(r.completed_at):"",r.dest_confirmed_at?hhmm(r.dest_confirmed_at):""]);
  const body=[head,...rows].map(l=>l.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+body],{type:"text/csv"}); const u=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=u; a.download="積込実績.csv"; a.click(); toast(t().csvDone);
}

async function addUserRole(){
  const idPart=document.getElementById("uEmail").value.trim().toLowerCase().replace(/@.*$/,"");
  const email=idPart?idPart+"@shinwa-active.co.jp":"";
  const role=document.getElementById("uRole").value;
  const note=document.getElementById("uNote").value.trim();
  const oki_home=document.getElementById("uOki").value||null;
  if(!email){ toast(lang==="ja"?"メールIDを入力してください":"Enter email ID"); return; }
  const {error}=await sb.from("user_roles").upsert({email,role,note,oki_home,updated_at:new Date().toISOString()},{onConflict:"email"});
  if(error){ toast(lang==="ja"?"保存に失敗しました":"Save failed"); return; }
  await logActivity("update","user_roles",null,`${email} → ${role}${oki_home?" ("+oki_home+")":""}`,null,{role,oki_home});

  renderUserMgmt();

async function editUserRole(id,email,currentRole,currentNote,currentOki){
  const roleLabels={admin:"管理者",worker:"現場",view_only:"閲覧専用",dest_only:"納品先確認"};
  const newRole=prompt(lang==="ja"?`${email}\n現在: ${roleLabels[currentRole]||currentRole}\n\n新しいロールを入力（admin/worker/view_only/dest_only）`:`${email}\nCurrent: ${currentRole}\n\nEnter new role:`, currentRole);
  if(!newRole||!["admin","worker","view_only","dest_only"].includes(newRole.trim())){ toast(lang==="ja"?"無効なロールです":"Invalid role"); return; }
  const newNote=prompt(lang==="ja"?"メモ（氏名・担当など）":"Note:", currentNote)||"";
  const newOki=prompt(lang==="ja"?"積み地担当（DC2 5F / DC2 3F / アトム電器 / 空欄=なし）":"Home dock:", currentOki||"")||null;
  const validOki=["DC2 5F","DC2 3F","アトム電器"];
  const finalOki=(newOki&&validOki.includes(newOki.trim()))?newOki.trim():null;
  await sb.from("user_roles").update({role:newRole.trim(),note:newNote,oki_home:finalOki,updated_at:new Date().toISOString()}).eq("id",id);
  await logActivity("update","user_roles",id,`${email} → ${newNote.trim()}`,{role:currentRole},{role:newRole.trim()});

  renderUserMgmt();
}

}

/* 数字→英字→カナ順ソート。先頭1文字の種別（数字→英字→カタカナ→その他）を判定し、
 * 同種内は文字列の自然順（ロケール比較）で並べる。 */
async function masterSortInGroup(){
  if(!confirm(lang==="ja"?"数字→英字→カナの順に並べ替えます。よろしいですか？":"Sort in order: numbers → letters → katakana. OK?")) return;
  const arr=(masterRows[mf.mode]||[]).slice();
  const typeOf=v=>{
    const c=(v||"").trim().charAt(0);
    if(/[0-9０-９]/.test(c)) return 0;   // 数字
    if(/[A-Za-zａ-ｚＡ-Ｚ]/.test(c)) return 1; // 英字
    if(/[\u30A0-\u30FF]/.test(c)) return 2; // カタカナ
    return 3; // その他
  };
  const indexed=arr.map((r,idx)=>({r,idx,t:typeOf(r.value)}));
  indexed.sort((a,b)=>(a.t-b.t)||(a.r.value||"").localeCompare(b.r.value||"",lang==="ja"?"ja":"en",{numeric:true,sensitivity:"base"}));
  const changed=[];
  indexed.forEach((item,newIdx)=>{ if(item.r.sort_order!==newIdx){ item.r.sort_order=newIdx; changed.push(item.r); } });
  masterRows[mf.mode]=indexed.map(item=>item.r);
  renderMaster();
  const results=await Promise.all(changed.map(r=>sb.from("master_items").update({sort_order:r.sort_order}).eq("id",r.id)));
  if(results.some(x=>x&&x.error)){ toast(lang==="ja"?"並べ替えの保存に失敗しました":"Reorder save failed"); await loadMaster(); }
  else toast(lang==="ja"?"数字→英字→カナ順に並べ替えました":"Sorted: numbers → letters → katakana");
}

  d.style.cssText="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,150,105,.88);animation:flashIn .18s ease";

  if(!document.getElementById("flashStyle")){
    const s=document.createElement("style"); s.id="flashStyle";

// 【下準備】物量予測・積込完了予測 ロジック予約
// 画面への表示は実績データが十分に蓄積されてから実装する。
// 現時点では「実績の保存」と「計算関数の骨格」のみ用意。
// =====================================================================

/* -- ① 物量実績を volume_history へ日付つきで保存（volSave時に呼ぶ） --
 * volume_shipmentは当日値の上書きのみのため、日別の履歴が残らない。
 * このテーブルに保存しておくことで、将来「通常比○%」計算の元データになる。
 * DB側に volume_history テーブルが必要（prepare_prediction.sql を先に実行）。 */
async function saveVolumeHistory(rows){
  try{
    const today=todayStr();
    const LABEL_TO_KEY={シャーク:"shark",シロカ:"siroca",ドリーム:"dream",パイオニア:"pioneer",アトム電器:"atom"};
    const upserts=[];
    for(const row of rows){
      const vrow=vol.find(x=>x.id===row.id); if(!vrow) continue;
      if(row.today_value==null || row.today_value===0) continue;
      const cap=(row.today_value!=null && vrow.productivity!=null && vrow.work_hours!=null && row.today_attend!=null)
        ? Math.round(vrow.productivity * vrow.work_hours * row.today_attend) : null;
      upserts.push({
        record_date:      today,
        shipper_label:    vrow.label||"",
        shipper_key:      LABEL_TO_KEY[(vrow.label||"").trim()]||null,
        value:            row.today_value,
        attend:           row.today_attend||null,
        productivity:     vrow.productivity||null,
        work_hours:       vrow.work_hours||null,
        capacity:         cap,
        saved_by:         user?.email||null,
        updated_at:       new Date().toISOString()
      });
    }
    if(!upserts.length) return;
    await sb.from("volume_history").upsert(upserts,{onConflict:"record_date,shipper_label"});
  }catch(e){ /* 履歴保存失敗はメイン処理を止めない */ }
}

/* -- ② 物量予測計算（実績蓄積後に画面へ反映する） ------------------
 * 「今日は通常比○%」= 今日の合計 / 直近N日の平均
 * 「○時頃出荷終了予測」= 開始時刻 + 今日の物量 / 生産性 / 人数
 * ※ 現時点では計算ロジックのみ。戻り値は使わない（表示しない）。     */
function calcVolumeAlert(historyRows, todayVolRows){
  try{
    const today=todayStr();
    // 今日の合計
    const todayTotal=todayVolRows.reduce((s,r)=>{
      return s+(r.updated_date===today ? (r.today_value||0) : 0);
    },0);
    if(!todayTotal) return null;

    // 直近30日の平均（除く今日）
    const past=historyRows.filter(r=>r.record_date!==today);
    if(past.length<5) return null; // 実績5日未満は予測しない
    const avgTotal=past.reduce((s,r)=>s+(r.value||0),0)/past.length;
    if(!avgTotal) return null;
    const ratio=Math.round((todayTotal/avgTotal)*100); // 通常比（%）

    // 出荷終了予測（全荷主合計の処理能力ベース）
    const totalCapacity=todayVolRows.reduce((s,r)=>{
      if(r.updated_date!==today) return s;
      const cap=calcCapacity(r); // 既存のcalcCapacity関数を流用
      return s+(cap||0);
    },0);
    let finishHhmm=null;
    if(totalCapacity>0){
      const startHour=6; // 出荷開始基準時刻（6:00）
      const hoursNeeded=todayTotal/totalCapacity*8; // 8時間基準で換算
      const finishMin=Math.round(startHour*60+hoursNeeded*60);
      finishHhmm=`${String(Math.floor(finishMin/60)).padStart(2,"0")}:${String(finishMin%60).padStart(2,"0")}`;
    }
    // 将来の表示用に返す（今は使わない）
    return { ratio, todayTotal, avgTotal, finishHhmm };
  }catch(e){ return null; }
}

/* -- ③ 積込完了予測（実績蓄積後に画面へ反映する） ------------------
 * 各トラックの「1回転時間」と「1回転PL数」を load_records から計算する。
 * departed_at（出発）と returned_at（帰還）が蓄積されてから使える。
 * 「パレット残り○PL / 1回転PL × 1回転時間 + 現在時刻」= 完了予測時刻
 * ※ 現時点は計算骨格のみ。表示なし。                                */
function calcLoadingFinishForecast(records, palletRemainRows){
  try{
    const now=new Date();
    const results=[];

    // トラック別に1回転時間・PLを集計（departed_at と returned_at が両方ある実績のみ）
    const truckStats={};
    records.filter(r=>r.departed_at&&r.returned_at&&!r.deleted_at).forEach(r=>{
      const truck=r.truck||"不明";
      const minPerRound=Math.round((new Date(r.returned_at)-new Date(r.departed_at))/60000);
      const pl=r.pallets||1;
      if(!truckStats[truck]) truckStats[truck]={rounds:[],totalPl:0,count:0};
      truckStats[truck].rounds.push(minPerRound);
      truckStats[truck].totalPl+=pl;
      truckStats[truck].count++;
    });

    // パレット残数ごとに完了予測を計算
    palletRemainRows.forEach(p=>{
      const remain=palBase(p); if(!remain) return;
      const label=p.label||""; // 積み地ラベル（例：DC2 5F）

      // その積み地に対応するトラックの平均値を使う（将来：積み地×トラックで絞り込み）
      const allStats=Object.values(truckStats);
      if(!allStats.length) return;

      const avgMinPerRound=allStats.reduce((s,t)=>s+(t.rounds.reduce((a,b)=>a+b,0)/t.rounds.length),0)/allStats.length;
      const avgPlPerRound=allStats.reduce((s,t)=>s+t.totalPl/t.count,0)/allStats.length;

      if(!avgMinPerRound||!avgPlPerRound) return;
      const roundsNeeded=Math.ceil(remain/avgPlPerRound);
      const minutesNeeded=roundsNeeded*avgMinPerRound;
      const finishAt=new Date(now.getTime()+minutesNeeded*60000);
      const hh=String(finishAt.getHours()).padStart(2,"0");
      const mm=String(finishAt.getMinutes()).padStart(2,"0");
      // 将来の表示用に返す（今は使わない）
      results.push({ label, remain, roundsNeeded, finishHhmm:`${hh}:${mm}` });
    });

    return results; // 例：[{label:"DC2 5F", remain:12, roundsNeeded:4, finishHhmm:"18:45"}]
  }catch(e){ return []; }
}

async function topbarTranslate(){
  const btn=document.getElementById("topbarTransBtn");
  const detailEl=document.getElementById("detailComment");
  const inputEl=document.getElementById("comment");
  const targetEl=detailEl||inputEl;
  if(!targetEl){ go("settings"); return; }
  const isInput=!!inputEl&&!detailEl;
  const getText=()=>isInput?targetEl.value.trim():targetEl.textContent.trim();
  const setText=(v)=>{ if(isInput) targetEl.value=v; else targetEl.textContent=v; };
  const noneTexts=[t().none,"（なし）","(none)"];
  if(_commentOriginal!==null){
    setText(_commentOriginal); _commentOriginal=null;
    if(btn){ btn.textContent="⚙ "+(lang==="ja"?"日本語":"EN"); btn.style.background="#334155"; btn.disabled=false; }
    return;
  }
  const text=getText();
  if(!text||noneTexts.includes(text)){ toast(lang==="ja"?"コメントがありません":"No comment to translate"); return; }
  if(btn){ btn.disabled=true; btn.textContent=lang==="ja"?"翻訳中…":"…"; }
  try{
    const sl=lang==="ja"?"ja":"en", tl=lang==="ja"?"en":"ja";
    const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
    const resp=await fetch(url);
    const data=await resp.json();
    const translated=data[0].map(seg=>seg[0]).join("");
    if(translated){
      _commentOriginal=text; setText(translated.trim());
      if(btn){ btn.disabled=false; btn.textContent="↩ 元に戻す"; btn.style.background="#1d4ed8"; }
    } else { throw new Error(); }
  } catch(e){
    toast(lang==="ja"?"翻訳に失敗しました":"Translation failed");
    if(btn){ btn.disabled=false; btn.textContent="⚙ "+(lang==="ja"?"日本語":"EN"); btn.style.background="#334155"; }
  }
}

/* ---------- DFレシート ---------- */
/* 当日の日付キー（YYYY-MM-DD） */
function dfTodayKey(){ return todayStr(); }

/* Supabase Storage: df_receipts バケット
   パス: df_receipts/{YYYY-MM-DD}/{userId}_{timestamp}.jpg
   バケットは public=false（signed URL で表示）
*/
let dfReceiptPhotos = [];   // {file, objectUrl, storagePath, uploading}
let dfReceiptLoaded = false;
let dfReceiptDate = "";     // 最後に読み込んだ日付

/* DFレシートモーダルを開く */
async function openDfReceipt(){
  const today = dfTodayKey();
  // 日付が変わっていたらリセット
  if(dfReceiptDate !== today){
    dfReceiptPhotos = [];
    dfReceiptDate = today;
    dfReceiptLoaded = false;
  }
  // モーダル描画（既存データをロード）
  renderDfReceiptModal();
  if(!dfReceiptLoaded){ await loadDfReceipts(); }
}

/* Supabase から当日の写真一覧をロード */
async function loadDfReceipts(){
  const today = dfTodayKey();
  dfReceiptLoaded = true;
  try{
    const { data, error } = await sb.storage.from("df_receipts").list(today+"/", {
      limit: 10, sortBy:{ column:"created_at", order:"asc" }
    });
    if(error){ console.warn("df_receipts list error", error); drawDfPhotos(); return; }
    if(!data || data.length===0){ drawDfPhotos(); return; }
    // 既に表示中のパスと重複しないものを追加
    const existing = dfReceiptPhotos.map(p=>p.storagePath);
    for(const item of data){
      const path = today+"/"+item.name;
      if(existing.includes(path)) continue;
      // Signed URL を取得して表示
      const { data:su } = await sb.storage.from("df_receipts").createSignedUrl(path, 3600);
      if(su && su.signedUrl){
        dfReceiptPhotos.push({ file:null, objectUrl:su.signedUrl, storagePath:path, uploading:false });
      }
    }
    drawDfPhotos();
  }catch(e){ console.warn("loadDfReceipts error",e); drawDfPhotos(); }
}

      <div id="dfPhotoMsg" style="font-size:13px;color:#94a3b8;margin-bottom:12px"></div>
      <label id="dfAddBtn" style="display:${dfReceiptPhotos.length<2?'flex':'none'};align-items:center;justify-content:center;gap:8px;background:#fee2e2;color:#dc2626;border:2px dashed #fca5a5;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin:0">
        📷 ${lang==="ja"?"写真を追加（"+( 2-dfReceiptPhotos.length)+"枚まで）":"Add photo ("+(2-dfReceiptPhotos.length)+" remaining)"}
        <input id="dfFileInput" type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="onDfFiles(event)">
      </label>
    </div>`;
  document.body.appendChild(overlay);
  // overlay タップで閉じる（モーダル内はバブリング止め）
  overlay.addEventListener("click", e=>{ if(e.target===overlay) closeDfReceipt(); });
  drawDfPhotos();
}

/* 写真エリアの再描画 */
function drawDfPhotos(){
  const area = document.getElementById("dfPhotoArea");
  const msg  = document.getElementById("dfPhotoMsg");
  const addBtn = document.getElementById("dfAddBtn");
  if(!area) return;

  if(dfReceiptPhotos.length === 0){
    area.innerHTML = `<div style="color:#94a3b8;font-size:15px;padding:10px 0">${lang==="ja"?"まだ写真がありません":"No photos yet"}</div>`;
  } else {
    area.innerHTML = dfReceiptPhotos.map((p,i)=>`
      <div style="position:relative">
        <img src="${p.objectUrl}" onclick="openDfPhoto(${i})" style="width:120px;height:120px;border-radius:14px;object-fit:cover;background:#e2e8f0;border:2px solid ${p.uploading?'#fbbf24':'#e2e8f0'};cursor:pointer">
        ${p.uploading?`<div style="position:absolute;inset:0;background:rgba(255,255,255,.6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px">⏳</div>`:""}
        ${!p.uploading?`<button onclick="removeDfPhoto(${i})" style="position:absolute;top:-8px;right:-8px;background:#dc2626;color:#fff;border:none;border-radius:999px;width:26px;height:26px;font-size:16px;line-height:1">×</button>`:""}
      </div>`).join("");
  }

  if(msg){
    const uploading = dfReceiptPhotos.filter(p=>p.uploading).length;
    msg.textContent = uploading>0 ? (lang==="ja"?"アップロード中...":"Uploading...") : "";
  }
  if(addBtn){
    const remaining = 2 - dfReceiptPhotos.length;
    addBtn.style.display = remaining > 0 ? "flex" : "none";
    const lbl = addBtn.querySelector("span") || addBtn;
    addBtn.childNodes[0].textContent = "";
    addBtn.innerHTML = `📷 ${lang==="ja"?"写真を追加（"+remaining+"枚まで）":"Add photo ("+remaining+" remaining)"}
      <input id="dfFileInput" type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="onDfFiles(event)">`;
  }
}

/* ファイル選択ハンドラ：圧縮 → Supabase アップロード */
async function onDfFiles(e){
  const MAX_BYTES = 10 * 1024 * 1024;
  const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp','image/heic','image/heif'];
  const remaining = 2 - dfReceiptPhotos.filter(p=>!p.uploading||p.storagePath).length;
  if(remaining <= 0){ toast(lang==="ja"?"2枚まで追加できます":"Max 2 photos"); return; }

  const files = [...e.target.files].slice(0, remaining);
  e.target.value = "";

  for(const f of files){
    if(!ALLOWED_TYPES.includes(f.type.toLowerCase()) && !f.name.toLowerCase().match(/\.(jpg|jpeg|png|webp|heic|heif)$/)){
      toast(lang==="ja"?`「${f.name}」は画像ファイルではありません`:`"${f.name}" is not an image`);
      continue;
    }
    if(f.size > MAX_BYTES){
      toast(lang==="ja"?`「${f.name}」が10MBを超えています（${(f.size/1024/1024).toFixed(1)}MB）`:`"${f.name}" exceeds 10MB`);
      continue;
    }
    // プレビュー用に仮追加（uploading=true）
    const tmpUrl = URL.createObjectURL(f);
    const tmpIdx = dfReceiptPhotos.length;
    dfReceiptPhotos.push({ file:f, objectUrl:tmpUrl, storagePath:"", uploading:true });
    drawDfPhotos();

    // compressPhoto で圧縮（既存関数を流用）
    const compressed = await compressPhoto(f);

    // Supabase にアップロード
    const today = dfTodayKey();
    const uid = user ? user.id : "unknown";
    const ts  = Date.now();
    const path = `${today}/${uid}_${ts}.jpg`;
    try{
      const { error } = await sb.storage.from("df_receipts").upload(path, compressed, { contentType:"image/jpeg" });
      if(error){ throw error; }
      // Signed URL 取得
      const { data:su } = await sb.storage.from("df_receipts").createSignedUrl(path, 3600);
      dfReceiptPhotos[tmpIdx] = {
        file: null,
        objectUrl: su ? su.signedUrl : tmpUrl,
        storagePath: path,
        uploading: false
      };
      toast(lang==="ja"?"DFレシートを保存しました":"DF receipt saved");
    }catch(err){
      console.warn("df_receipt upload error", err);
      toast(lang==="ja"?"アップロードに失敗しました":"Upload failed");
      dfReceiptPhotos.splice(tmpIdx, 1);
    }
    drawDfPhotos();
  }
}

/* 写真を削除（Supabase Storageからも削除） */
async function removeDfPhoto(idx){
  const p = dfReceiptPhotos[idx];
  if(!p) return;
  if(p.storagePath){
    try{ await sb.storage.from("df_receipts").remove([p.storagePath]); }catch(e){ console.warn(e); }
  }
  dfReceiptPhotos.splice(idx, 1);
  drawDfPhotos();
}

function openDfPhoto(i){
  const p = dfReceiptPhotos[i];
  if(!p) return;
  const ov = document.createElement("div");
  ov.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:12px";
  ov.onclick = ()=>ov.remove();
  ov.innerHTML = `<img src="${p.objectUrl}" style="max-width:98%;max-height:82%;border-radius:10px;object-fit:contain"><button style="margin-top:18px;background:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:bold">${lang==="ja"?"閉じる":"Close"}</button>`;
  document.body.appendChild(ov);
}

function closeDfReceipt(){
  const m = document.getElementById("dfReceiptModal");
  if(m) m.remove();
}
